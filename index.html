<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ restaurant }} — Menu</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header>
    <div class="site-header">
      <div class="brand">
        <img src="/static/park.png" alt="logo" style="width:52px;height:52px;border-radius:8px;object-fit:cover">
        <div>
          <h1>{{ restaurant }}</h1>
          <small>Scan QR & order from your table</small>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="meta">{% if table %}Table: <strong>{{ table }}</strong>{% endif %}</div>
        <a class="btn secondary" href="/cart?table={{ table|default('') }}">Cart ({{ cart_count }})</a>
      </div>
    </div>
  </header>
  <main class="container">
    <h2>Menu Categories</h2>
    <div class="grid">
      {% for c in categories %}
      <a href="/category/{{ c }}?table={{ table }}" class="card-link">
        <article class="card">
          <div class="card-body">
            <h3 class="card-title">{{ c }}</h3>
            <p class="card-desc">Tap to see {{ c }} items and order from your table.</p>
            <!-- No button anymore -->
            <div class="meta-placeholder">&nbsp;</div>
          </div>
        </article>
      </a>
      {% endfor %}
    </div>
    <div style="margin-top: 20px;">
      <a class="btn" href="/cart?table={{ table }}">View Cart</a>
    </div>
  </main>
</body>
</html>
